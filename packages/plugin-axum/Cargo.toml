[package]
name = "typokit-plugin-axum"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["napi4", "serde-json"] }
napi-derive = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
typokit-transform-native = { path = "../transform-native" }

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
