name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  pull_request_target:
    types: [opened, edited, synchronize]

jobs:
  lint-pr-title:
    if: github.event_name == 'pull_request_target' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        if: github.event_name == 'push'
        run: pnpm nx run-many -t build

      - name: Build affected packages
        if: github.event_name == 'pull_request'
        run: pnpm nx affected -t build

      - name: Typecheck affected
        run: pnpm nx affected -t typecheck

      - name: Lint affected
        run: pnpm nx affected -t lint

      - name: Test affected
        run: pnpm nx affected -t test

  e2e:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: typokit
          POSTGRES_PASSWORD: typokit
          POSTGRES_DB: typokit_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        if: github.event_name == 'push'
        run: pnpm nx run-many -t build

      - name: Build affected packages
        if: github.event_name == 'pull_request'
        run: pnpm nx affected -t build

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://typokit:typokit@localhost:5432/typokit_e2e
        run: pnpm nx affected -t test:e2e

  build-native-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native modules (smoke test)
        run: |
          cd packages/transform-native && npx napi build --platform --release --target x86_64-unknown-linux-gnu && cd ../..
          cd packages/plugin-axum && npx napi build --platform --release --target x86_64-unknown-linux-gnu && cd ../..

  build-native:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: |
              cd packages/transform-native && npx napi build --platform --release --target x86_64-unknown-linux-gnu && cd ../..
              cd packages/plugin-axum && npx napi build --platform --release --target x86_64-unknown-linux-gnu && cd ../..
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: |
              cd packages/transform-native && npx napi build --platform --release --target aarch64-unknown-linux-gnu && cd ../..
              cd packages/plugin-axum && npx napi build --platform --release --target aarch64-unknown-linux-gnu && cd ../..
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: |
              cd packages/transform-native && npx napi build --platform --release --target x86_64-unknown-linux-musl && cd ../..
              cd packages/plugin-axum && npx napi build --platform --release --target x86_64-unknown-linux-musl && cd ../..
          - host: macos-14
            target: x86_64-apple-darwin
            build: |
              cd packages/transform-native && npx napi build --platform --release --target x86_64-apple-darwin && cd ../..
              cd packages/plugin-axum && npx napi build --platform --release --target x86_64-apple-darwin && cd ../..
          - host: macos-14
            target: aarch64-apple-darwin
            build: |
              cd packages/transform-native && npx napi build --platform --release --target aarch64-apple-darwin && cd ../..
              cd packages/plugin-axum && npx napi build --platform --release --target aarch64-apple-darwin && cd ../..
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: |
              cd packages/transform-native && npx napi build --platform --release --target x86_64-pc-windows-msvc && cd ../..
              cd packages/plugin-axum && npx napi build --platform --release --target x86_64-pc-windows-msvc && cd ../..
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install cross-compilation tools (musl)
        if: matrix.settings.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native modules
        run: ${{ matrix.settings.build }}

      - name: Upload transform-native artifact
        uses: actions/upload-artifact@v4
        with:
          name: transform-native-${{ matrix.settings.target }}
          path: packages/transform-native/*.node
          if-no-files-found: error

      - name: Upload plugin-axum artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-axum-${{ matrix.settings.target }}
          path: packages/plugin-axum/*.node
          if-no-files-found: error

  release:
    needs: [build-and-test, e2e, build-native]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm nx run-many -t build

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts

      - name: Move native artifacts to package directories
        run: |
          # napi artifacts expects files in ./artifacts/
          mkdir -p packages/transform-native/artifacts packages/plugin-axum/artifacts
          for dir in native-artifacts/transform-native-*; do
            cp "$dir"/*.node packages/transform-native/artifacts/ 2>/dev/null || true
          done
          for dir in native-artifacts/plugin-axum-*; do
            cp "$dir"/*.node packages/plugin-axum/artifacts/ 2>/dev/null || true
          done
          echo "=== transform-native artifacts ==="
          ls -la packages/transform-native/artifacts/
          echo "=== plugin-axum artifacts ==="
          ls -la packages/plugin-axum/artifacts/

      - name: Organize native artifacts for publishing
        run: |
          cd packages/transform-native && npx napi artifacts --npm-dir npm && cd ../..
          cd packages/plugin-axum && npx napi artifacts --npm-dir npm && cd ../..

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Nx release broken into sub-commands so native platform packages
      # can be versioned and published in lock-step with the main packages.

      - name: "Release: Version"
        id: version
        run: |
          pnpm nx release version
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: "Release: Sync native platform versions"
        run: node --experimental-strip-types scripts/sync-native-versions.ts

      - name: "Release: Update lockfile"
        run: pnpm install --no-frozen-lockfile

      - name: "Release: Commit sync changes"
        run: |
          git add -A
          git diff --staged --quiet || git commit --amend --no-edit

      - name: "Release: Publish native platform packages"
        run: |
          for dir in packages/transform-native/npm/*/; do
            if [ -f "$dir/package.json" ] && ls "$dir"/*.node 1>/dev/null 2>&1; then
              node --experimental-strip-types scripts/npm-publish.ts "$dir"
            fi
          done
          for dir in packages/plugin-axum/npm/*/; do
            if [ -f "$dir/package.json" ] && ls "$dir"/*.node 1>/dev/null 2>&1; then
              node --experimental-strip-types scripts/npm-publish.ts "$dir"
            fi
          done
        env:
          NPM_ACCESS_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: "Release: Publish native main packages"
        run: |
          node --experimental-strip-types scripts/npm-publish.ts packages/transform-native
          node --experimental-strip-types scripts/npm-publish.ts packages/plugin-axum
        env:
          NPM_ACCESS_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: "Release: Changelog"
        run: pnpm nx release changelog ${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: "Release: Bootstrap new packages"
        run: node --experimental-strip-types scripts/bootstrap-new-packages.ts
        env:
          NPM_ACCESS_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: "Release: Publish"
        run: pnpm nx release publish
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: true

      - name: "Release: Sync lockfile with published packages"
        run: |
          pnpm install --no-frozen-lockfile
          git add pnpm-lock.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync lockfile after publish [skip ci]"
          fi

      - name: "Release: Push tags and commits"
        run: git push --follow-tags
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
