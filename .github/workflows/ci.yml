name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  pull_request_target:
    types: [opened, edited, synchronize]

jobs:
  lint-pr-title:
    if: github.event_name == 'pull_request_target' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        if: github.event_name == 'push'
        run: pnpm nx run-many -t build

      - name: Build affected packages
        if: github.event_name == 'pull_request'
        run: pnpm nx affected -t build

      - name: Typecheck affected
        run: pnpm nx affected -t typecheck

      - name: Lint affected
        run: pnpm nx affected -t lint

      - name: Test affected
        run: pnpm nx affected -t test

  e2e:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: typokit
          POSTGRES_PASSWORD: typokit
          POSTGRES_DB: typokit_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        if: github.event_name == 'push'
        run: pnpm nx run-many -t build

      - name: Build affected packages
        if: github.event_name == 'pull_request'
        run: pnpm nx affected -t build

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://typokit:typokit@localhost:5432/typokit_e2e
        run: pnpm nx affected -t test:e2e

  release:
    needs: [build-and-test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm nx run-many -t build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for first release
        id: check-release
        run: |
          if git tag -l "v*" | grep -q .; then
            echo "first_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "first_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Release
        run: |
          if [ "${{ steps.check-release.outputs.first_release }}" = "true" ]; then
            pnpm nx release --yes --first-release
          else
            pnpm nx release --yes
          fi
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # TODO: Remove NODE_AUTH_TOKEN after first release and switching to npm Trusted Publishing
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
