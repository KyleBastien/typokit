name: Benchmarks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-affected:
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.check.outputs.affected }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if benchmarks are affected
        id: check
        run: |
          AFFECTED=$(pnpm nx show projects --affected 2>/dev/null || echo "")
          if echo "$AFFECTED" | grep -q "benchmarks"; then
            echo "affected=true" >> "$GITHUB_OUTPUT"
          else
            echo "affected=false" >> "$GITHUB_OUTPUT"
          fi

  # ── PR Mode: fast regression check ──────────────────────────

  bench-pr:
    needs: check-affected
    if: needs.check-affected.outputs.affected == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build affected packages
        run: pnpm nx affected -t build

      - name: Run benchmark suite (CI mode)
        run: pnpm nx run benchmarks:bench-ci

      - name: Compare against baseline
        id: compare
        continue-on-error: true
        run: |
          cd packages/benchmarks
          npx tsx src/compare-baseline.ts baseline.json results/latest.json /tmp/benchmark-comment.md

      - name: Post PR comment
        if: always() && steps.compare.outcome != 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('/tmp/benchmark-comment.md', 'utf-8');
            } catch {
              body = '## Benchmark Results vs Baseline\n\n⚠️ Benchmark comparison could not be generated.';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## Benchmark Results vs Baseline';
            const existing = comments.find(c => c.body?.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on regression
        if: steps.compare.outcome == 'failure'
        run: |
          echo "::error::Benchmark regression detected — TypoKit combination(s) degraded by more than 10%"
          exit 1

  # ── Main Mode: full suite, commit results, trigger docs ─────

  bench-main:
    needs: check-affected
    if: needs.check-affected.outputs.affected == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: nrwl/nx-set-shas@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm nx run-many -t build

      - name: Run full benchmark suite
        run: pnpm nx run benchmarks:bench

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/benchmarks/results/latest.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(benchmarks): update benchmark results [skip ci]"
            git pull --rebase
            git push
          fi

